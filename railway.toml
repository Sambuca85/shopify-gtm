[build]
builder = "NIXPACKS"
buildCommand = "DATABASE_URL=postgresql://localhost:5432/gtm_tracking npx prisma generate && npm run build"

[deploy]
startCommand = "DATABASE_URL=postgresql://localhost:5432/gtm_tracking npx prisma migrate deploy && DATABASE_URL=postgresql://localhost:5432/gtm_tracking npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 60

[deploy.env]
NODE_ENV = "production"
SKIP_ENV_VALIDATION = "true"
